<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美瞳库存看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f5f7fa;
  min-height: 100vh;
}
.container { max-width: 900px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
}
.header h1 { font-size: 20px; color: #1a1a2e; }
.header .subtitle { font-size: 13px; color: #888; }
.header .actions { display: flex; gap: 8px; }

.btn {
  padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px;
  cursor: pointer; transition: all 0.2s; font-weight: 500;
}
.btn-primary { background: #4a90d9; color: #fff; }
.btn-primary:hover { background: #357abd; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-success { background: #27ae60; color: #fff; }
.btn-success:hover { background: #219a52; }
.btn-secondary { background: #f0f2f5; color: #666; border: 1px solid #ddd; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* Ticker */
.ticker-bar {
  background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
  color: white;
  border-radius: 8px;
  padding: 10px 16px;
  margin-bottom: 16px;
  font-size: 13px;
  overflow: hidden;
}
.ticker-bar .label { font-weight: 700; margin-right: 8px; }
.ticker-scroll { display: flex; gap: 20px; overflow-x: auto; }
.ticker-item { white-space: nowrap; }
.ticker-item .date { color: #ffeaa7; font-weight: 700; }

/* Section */
.section {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.section-title {
  font-size: 16px; font-weight: bold; color: #1a1a2e;
  margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
}

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #f0f0f0; }
th { background: #fafbfc; font-weight: 600; color: #666; font-size: 12px; }
tr:hover { background: #fafbfc; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600;
}
.badge-red { background: #fdecea; color: #c0392b; }
.badge-orange { background: #fef5e7; color: #e67e22; }
.badge-green { background: #eafaf1; color: #27ae60; }

/* Edit mode */
.edit-row td { padding: 6px 8px; }
.edit-row input, .edit-row select {
  padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px;
  font-size: 13px; width: 100%; outline: none;
}
.edit-row input:focus, .edit-row select:focus { border-color: #4a90d9; }
.edit-actions { display: flex; gap: 6px; }

/* Token config */
.token-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 9999;
  justify-content: center; align-items: center;
}
.token-card {
  background: #fff; border-radius: 16px; padding: 32px;
  max-width: 400px; width: 90%; text-align: center;
}
.token-card h3 { margin-bottom: 12px; }
.token-card p { font-size: 13px; color: #888; margin-bottom: 16px; }
.token-card input {
  width: 100%; padding: 10px; border: 1px solid #ddd;
  border-radius: 8px; margin-bottom: 12px; font-size: 13px;
}

/* Status bar */
.status-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 1px solid #eee;
  padding: 10px 16px; display: flex; justify-content: space-between;
  align-items: center; font-size: 12px; color: #888; z-index: 100;
}
.status-bar .sync-ok { color: #27ae60; }
.status-bar .sync-err { color: #e74c3c; }

/* Toast */
.toast {
  position: fixed; top: 20px; right: 20px;
  padding: 12px 20px; border-radius: 8px; color: #fff;
  font-size: 13px; z-index: 10000; animation: slideIn 0.3s ease;
}
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }
@keyframes slideIn {
  from { transform: translateX(100px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.empty-tip { text-align: center; color: #888; padding: 30px; font-size: 13px; }
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div>
    <h1>美瞳库存看板</h1>
    <div class="subtitle">实时同步 | 自动刷新 | 多客服共享</div>
  </div>
  <div class="actions">
    <button class="btn btn-secondary btn-sm" onclick="toggleEdit()" id="editBtn">📝 编辑模式</button>
    <button class="btn btn-primary btn-sm" onclick="refreshData()">🔄 刷新</button>
    <button class="btn btn-secondary btn-sm" onclick="showTokenConfig()">⚙️ 配置</button>
  </div>
</div>

<!-- 补货中轮播 -->
<div class="ticker-bar" id="tickerBar" style="display:none;">
  <span class="label">📦 补货中：</span>
  <div class="ticker-scroll" id="tickerScroll"></div>
</div>

<!-- 缺货列表 -->
<div class="section">
  <div class="section-title">
    <span>🚫 缺货/下架</span>
    <span class="badge badge-red" id="outStockCount">0</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>名称</th><th>类型</th><th>备注</th><th style="width:80px;">操作</th></tr>
      </thead>
      <tbody id="outStockBody"></tbody>
    </table>
    <div class="empty-tip" id="outStockEmpty" style="display:none;">暂无缺货记录</div>
  </div>
  <div style="margin-top:12px; display:none;" id="addOutStockWrap">
    <button class="btn btn-danger btn-sm" onclick="addRow('outOfStock')">+ 添加缺货</button>
  </div>
</div>

<!-- 补货中列表 -->
<div class="section">
  <div class="section-title">
    <span>📦 补货中</span>
    <span class="badge badge-orange" id="restockCount">0</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>名称</th><th>类型</th><th>预计到货</th><th>备注</th><th style="width:80px;">操作</th></tr>
      </thead>
      <tbody id="restockBody"></tbody>
    </table>
    <div class="empty-tip" id="restockEmpty" style="display:none;">暂无补货记录</div>
  </div>
  <div style="margin-top:12px; display:none;" id="addRestockWrap">
    <button class="btn btn-success btn-sm" onclick="addRow('restocking')">+ 添加补货</button>
  </div>
</div>

</div>

<!-- Token 配置弹窗 -->
<div class="token-overlay" id="tokenOverlay">
  <div class="token-card">
    <h3>⚙️ GitHub Token 配置</h3>
    <p>配置后可在线编辑库存数据，数据会自动同步给所有客服。<br>Token 仅保存在本机浏览器中。</p>
    <input type="password" id="tokenInput" placeholder="输入 GitHub Personal Access Token">
    <button class="btn btn-primary" onclick="saveToken()" style="width:100%;">保存</button>
    <p style="margin-top:12px; font-size:12px; color:#999;">
      <a href="https://github.com/settings/tokens" target="_blank" style="color:#4a90d9;">如何获取 Token？</a>
    </p>
    <button class="btn btn-secondary" onclick="hideTokenConfig()" style="margin-top:8px; width:100%;">取消</button>
  </div>
</div>

<!-- 底部状态栏 -->
<div class="status-bar">
  <span id="syncStatus">🔄 正在加载...</span>
  <span>⏱ 每30秒自动刷新</span>
</div>

<script>
// Config
const OWNER = 'yangru2026';
const REPO = 'stock-monitor';
const FILE_PATH = 'data.json';
const RAW_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}`;

// State
let data = { version: 2, outOfStock: [], restocking: [] };
let isEditMode = false;
let token = localStorage.getItem('github_token') || '';
let autoRefresh = null;

// Init
loadData();
startAutoRefresh();

// Load data from GitHub
async function loadData() {
  updateStatus('🔄 正在加载...');
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('Load failed');
    data = await res.json();
    render();
    updateStatus('✅ 数据已同步 ' + new Date().toLocaleTimeString('zh-CN'));
  } catch(e) {
    updateStatus('❌ 加载失败，请检查网络');
    showToast('加载失败，请刷新重试', 'error');
  }
}

// Render
function render() {
  // Out of stock
  const outBody = document.getElementById('outStockBody');
  const outEmpty = document.getElementById('outStockEmpty');
  outBody.innerHTML = '';
  
  if (!data.outOfStock || data.outOfStock.length === 0) {
    outEmpty.style.display = 'block';
  } else {
    outEmpty.style.display = 'none';
    data.outOfStock.forEach((item, idx) => {
      const tr = document.createElement('tr');
      if (isEditMode) {
        tr.className = 'edit-row';
        tr.innerHTML = `
          <td><input value="${esc(item.name)}" onchange="updateItem('outOfStock',${idx},'name',this.value)"></td>
          <td><input value="${esc(item.type || '')}" onchange="updateItem('outOfStock',${idx},'type',this.value)"></td>
          <td><input value="${esc(item.note || '')}" onchange="updateItem('outOfStock',${idx},'note',this.value)"></td>
          <td class="edit-actions"><button class="btn btn-danger btn-sm" onclick="deleteItem('outOfStock',${idx})">删除</button></td>
        `;
      } else {
        tr.innerHTML = `
          <td><strong>${esc(item.name)}</strong></td>
          <td><span class="badge badge-red">${esc(item.type || '-')}</span></td>
          <td>${esc(item.note || '')}</td>
          <td>-</td>
        `;
      }
      outBody.appendChild(tr);
    });
  }
  document.getElementById('outStockCount').textContent = (data.outOfStock || []).length;

  // Restocking
  const restockBody = document.getElementById('restockBody');
  const restockEmpty = document.getElementById('restockEmpty');
  restockBody.innerHTML = '';
  
  if (!data.restocking || data.restocking.length === 0) {
    restockEmpty.style.display = 'block';
    document.getElementById('tickerBar').style.display = 'none';
  } else {
    restockEmpty.style.display = 'none';
    data.restocking.forEach((item, idx) => {
      const tr = document.createElement('tr');
      if (isEditMode) {
        tr.className = 'edit-row';
        tr.innerHTML = `
          <td><input value="${esc(item.name)}" onchange="updateItem('restocking',${idx},'name',this.value)"></td>
          <td><input value="${esc(item.type || '')}" onchange="updateItem('restocking',${idx},'type',this.value)"></td>
          <td><input value="${esc(item.expectedDate || '')}" onchange="updateItem('restocking',${idx},'expectedDate',this.value)"></td>
          <td><input value="${esc(item.note || '')}" onchange="updateItem('restocking',${idx},'note',this.value)"></td>
          <td class="edit-actions"><button class="btn btn-danger btn-sm" onclick="deleteItem('restocking',${idx})">删除</button></td>
        `;
      } else {
        tr.innerHTML = `
          <td><strong>${esc(item.name)}</strong></td>
          <td><span class="badge badge-orange">${esc(item.type || '-')}</span></td>
          <td><span class="badge badge-green">${esc(item.expectedDate || '待定')}</span></td>
          <td>${esc(item.note || '')}</td>
          <td>-</td>
        `;
      }
      restockBody.appendChild(tr);
    });
    
    // Update ticker
    const ticker = document.getElementById('tickerScroll');
    ticker.innerHTML = data.restocking.map(i => 
      `<span class="ticker-item">${esc(i.name)} <span class="date">${esc(i.expectedDate || '待定')}</span>到货</span>`
    ).join('');
    document.getElementById('tickerBar').style.display = 'block';
  }
  document.getElementById('restockCount').textContent = (data.restocking || []).length;
}

// Toggle edit mode
function toggleEdit() {
  if (!token) {
    showToast('请先配置 GitHub Token 才能编辑', 'error');
    showTokenConfig();
    return;
  }
  isEditMode = !isEditMode;
  document.getElementById('editBtn').textContent = isEditMode ? '💾 保存修改' : '📝 编辑模式';
  document.getElementById('editBtn').className = isEditMode ? 'btn btn-success btn-sm' : 'btn btn-secondary btn-sm';
  document.getElementById('addOutStockWrap').style.display = isEditMode ? 'block' : 'none';
  document.getElementById('addRestockWrap').style.display = isEditMode ? 'block' : 'none';
  
  if (!isEditMode) {
    // Saving
    saveData();
  }
  render();
}

// Add row
function addRow(type) {
  if (!data[type]) data[type] = [];
  const newItem = { name: '', type: '', note: '', status: type === 'outOfStock' ? 'permanent' : 'restocking', id: 'new_' + Date.now() };
  if (type === 'restocking') newItem.expectedDate = '';
  data[type].push(newItem);
  render();
}

// Update item
function updateItem(type, idx, field, value) {
  if (!data[type]) return;
  data[type][idx][field] = value;
}

// Delete item
function deleteItem(type, idx) {
  if (!data[type]) return;
  if (confirm('确定删除这条记录？')) {
    data[type].splice(idx, 1);
    render();
  }
}

// Save data to GitHub
async function saveData() {
  if (!token) return;
  updateStatus('💾 正在保存...');
  
  try {
    // Get current SHA
    const shaRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
      headers: { 'Authorization': 'token ' + token, 'User-Agent': 'stock-monitor' }
    });
    const shaData = await shaRes.json();
    
    // Update file
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const saveRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json',
        'User-Agent': 'stock-monitor'
      },
      body: JSON.stringify({
        message: 'Update stock data via web',
        content: content,
        sha: shaData.sha
      })
    });
    
    if (saveRes.ok) {
      showToast('✅ 保存成功！所有客服刷新后可见', 'success');
      updateStatus('✅ 已保存 ' + new Date().toLocaleTimeString('zh-CN'));
    } else {
      const err = await saveRes.json();
      showToast('保存失败: ' + (err.message || '未知错误'), 'error');
      updateStatus('❌ 保存失败');
    }
  } catch(e) {
    showToast('保存失败: ' + e.message, 'error');
    updateStatus('❌ 保存失败');
  }
}

// Refresh
function refreshData() {
  loadData();
  showToast('🔄 已刷新', 'success');
}

// Auto refresh
function startAutoRefresh() {
  autoRefresh = setInterval(() => {
    if (!isEditMode) loadData();
  }, 30000); // 30秒
}

// Token config
function showTokenConfig() {
  document.getElementById('tokenOverlay').style.display = 'flex';
  document.getElementById('tokenInput').value = token;
}
function hideTokenConfig() {
  document.getElementById('tokenOverlay').style.display = 'none';
}
function saveToken() {
  token = document.getElementById('tokenInput').value.trim();
  localStorage.setItem('github_token', token);
  hideTokenConfig();
  showToast('Token 已保存', 'success');
}

// Utilities
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function updateStatus(text) {
  document.getElementById('syncStatus').textContent = text;
}
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>

</body>
</html>
