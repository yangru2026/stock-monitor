<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美瞳库存看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* === 顶部轮播条(可独立使用) === */
        .ticker-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 44px;
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            display: flex;
            align-items: center;
            z-index: 9999;
            box-shadow: 0 2px 12px rgba(231, 76, 60, 0.3);
            cursor: pointer;
            user-select: none;
        }
        .ticker-bar:hover {
            background: linear-gradient(90deg, #c0392b 0%, #a93226 100%);
        }
        .ticker-label {
            background: rgba(0,0,0,0.25);
            padding: 0 18px;
            height: 44px;
            display: flex;
            align-items: center;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .ticker-content {
            flex: 1;
            overflow: hidden;
            height: 44px;
            line-height: 44px;
            position: relative;
            mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
        }
        .ticker-scroll {
            display: flex;
            animation: scroll 80s linear infinite;
            white-space: nowrap;
            position: absolute;
            left: 0;
        }
        .ticker-scroll:hover {
            animation-play-state: paused;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            padding: 0 24px;
            font-size: 13px;
        }
        .ticker-item .badge {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            padding: 2px 8px;
            margin-right: 8px;
            font-size: 11px;
            font-weight: 700;
        }
        .ticker-item .badge.down {
            background: rgba(0,0,0,0.3);
        }
        .ticker-item .date {
            color: #ffeaa7;
            font-weight: 700;
            margin-left: 4px;
        }
        .ticker-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 8px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .ticker-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* === 独立轮播模式 === */
        body.ticker-only {
            background: transparent;
            min-height: auto;
        }
        body.ticker-only .ticker-bar {
            position: relative;
            border-radius: 0 0 8px 8px;
        }
        body.ticker-only .main-content {
            display: none;
        }

        /* === 主内容区 === */
        .main-content {
            margin-top: 44px;
            padding: 16px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 20px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .subtitle {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .header-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .header-btn.primary {
            background: #e74c3c;
            color: white;
        }
        .header-btn.primary:hover {
            background: #c0392b;
        }
        .header-btn.secondary {
            background: white;
            color: #555;
            border: 1px solid #ddd;
        }
        .header-btn.secondary:hover {
            background: #f5f5f5;
        }

        /* === 数据卡片 === */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            text-align: center;
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
        }
        .stat-card .number.red { color: #e74c3c; }
        .stat-card .number.orange { color: #e67e22; }
        .stat-card .number.green { color: #27ae60; }
        .stat-card .number.blue { color: #3498db; }
        .stat-card .label {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 6px;
        }
        .stat-card .trend {
            font-size: 11px;
            margin-top: 4px;
        }
        .trend.up { color: #e74c3c; }
        .trend.down { color: #27ae60; }

        /* === 面板 === */
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 768px) {
            .panels { grid-template-columns: 1fr; }
        }
        .panel {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 700;
        }
        .panel-title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-red { background: #e74c3c; }
        .dot-orange { background: #e67e22; }
        .dot-green { background: #27ae60; }
        .panel-badge {
            background: #f0f0f0;
            color: #666;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
        }
        .panel-body {
            padding: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        /* === 库存项 === */
        .stock-item {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        .stock-item:hover {
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stock-item.permanent {
            background: #fdf2f2;
            border-left: 4px solid #e74c3c;
        }
        .stock-item.restocking {
            background: #fef6e9;
            border-left: 4px solid #e67e22;
        }
        .stock-item.arriving-today {
            background: #e8f5e9;
            border-left: 4px solid #27ae60;
            animation: pulse 2s infinite;
        }
        .stock-item.arriving-soon {
            background: #fff8e1;
            border-left: 4px solid #f9a825;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.2); }
            50% { box-shadow: 0 0 0 6px rgba(39, 174, 96, 0); }
        }
        .stock-item .name-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .stock-item .name {
            font-weight: 700;
            font-size: 14px;
            color: #2c3e50;
        }
        .stock-item .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 8px;
        }
        .tag-type {
            background: rgba(0,0,0,0.06);
            color: #666;
        }
        .tag-status-down {
            background: #ffebee;
            color: #c62828;
        }
        .tag-status-coming {
            background: #fff3e0;
            color: #e65100;
        }
        .tag-status-today {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .stock-item .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .stock-item .meta {
            font-size: 12px;
            color: #888;
        }
        .stock-item .date {
            font-size: 12px;
            font-weight: 700;
            color: #e67e22;
        }
        .stock-item .date.today {
            color: #27ae60;
        }
        .stock-item .date.past {
            color: #e74c3c;
        }
        .stock-item .note {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            font-style: italic;
        }
        .stock-item .check-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .stock-item .check-btn:hover {
            background: #f5f5f5;
        }
        .stock-item.checked {
            opacity: 0.5;
        }
        .stock-item.checked .name {
            text-decoration: line-through;
            color: #999;
        }

        /* === 快速编辑区 === */
        .quick-edit {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        .quick-edit-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .quick-edit-row select {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            background: white;
        }
        .quick-edit-row input {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        /* === 面板内快速添加 === */
        .panel-add-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .panel-add-row {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
        }
        .panel-add-row input {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            background: white;
        }

        .stock-item.pinned {
            border-left-width: 6px;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.15);
        }

        /* === 空状态 === */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #bbb;
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        /* === 管理模态框 === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 18px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        .modal-header h2 {
            font-size: 18px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .modal-close:hover {
            background: #f0f0f0;
            color: #333;
        }
        .modal-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #e74c3c;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #e74c3c;
            color: white;
        }
        .btn-primary:hover {
            background: #c0392b;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-danger {
            background: #ffebee;
            color: #c62828;
        }
        .btn-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .btn-small {
            padding: 5px 12px;
            font-size: 12px;
        }

        .manage-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-top: 14px;
        }
        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        .manage-item:last-child {
            border-bottom: none;
        }
        .manage-item:hover {
            background: #f8f9fa;
        }
        .manage-item-info {
            flex: 1;
        }
        .manage-item-name {
            font-weight: 600;
            color: #333;
        }
        .manage-item-meta {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }
        .manage-item-actions {
            display: flex;
            gap: 6px;
        }

        .data-ops {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 14px;
            margin-top: 18px;
        }
        .data-ops h4 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #555;
        }
        .data-ops textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }
        .data-ops-btns {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10001;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .today-highlight {
            background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .today-highlight .icon {
            font-size: 20px;
        }
        .today-highlight .text {
            font-weight: 700;
        }
    </style>
</head>
<body>
    <!-- 顶部轮播条 -->
    <div class="ticker-bar" id="tickerBar" onclick="toggleExpand()">
        <div class="ticker-label">🔥 缺货提醒</div>
        <div class="ticker-content">
            <div class="ticker-scroll" id="tickerScroll"></div>
        </div>
        <div style="display:flex;align-items:center;flex-shrink:0;padding-right:8px;">
            <button class="ticker-btn" onclick="event.stopPropagation();openManage()">⚙️ 管理</button>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="header">
            <div>
                <h1>📦 美瞳库存看板</h1>
                <div class="subtitle">打开即见,无需搜索 - 接待前扫一眼,避免备注缺货花色</div>
            </div>
            <div class="header-actions">
                <button class="header-btn secondary" onclick="toggleTickerOnly()">🎯 仅轮播</button>
                <button class="header-btn" style="background: #e74c3c; color: white;" onclick="openQuickAdd()">➕ 快速添加</button>
                <button class="header-btn primary" onclick="openManage()">⚙️ 管理数据</button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="number red" id="statOut">0</div>
                <div class="label">缺货下架</div>
                <div class="trend up">⚠️ 卖完不补</div>
            </div>
            <div class="stat-card">
                <div class="number orange" id="statRestock">0</div>
                <div class="label">预计到货</div>
                <div class="trend">📅 告知客户</div>
            </div>
            <div class="stat-card">
                <div class="number green" id="statToday">0</div>
                <div class="label">今日到货</div>
                <div class="trend down">✅ 可正常备注</div>
            </div>
            <div class="stat-card">
                <div class="number blue" id="statTotal">0</div>
                <div class="label">监控总数</div>
                <div class="trend">📊 实时更新</div>
            </div>
        </div>

        <!-- 今日到货提醒 -->
        <div id="todayHighlight"></div>

        <!-- 面板 -->
        <div class="panels">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="dot dot-red"></span>
                        缺货下架（卖完不补，查库存确认）
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end;">
                        <input type="text" id="searchOut" placeholder="🔍 搜索花色..." style="padding:4px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;width:120px;" oninput="filterPanel('out')">
                        <span class="panel-badge" id="outBadge">0</span>
                        <button class="btn btn-small" style="background:#e74c3c;color:white;border:none;padding:4px 10px;font-size:12px;cursor:pointer;" onclick="togglePanelAdd('out')" title="添加缺货花色">➕</button>
                    </div>
                </div>
                <div class="panel-add-form" id="panelAdd-out" style="display:none;padding:10px 16px;background:#f8f9fa;border-bottom:1px solid #f0f0f0;">
                    <div style="font-size:11px;color:#888;margin-bottom:6px;">💡 支持批量粘贴，每行一个花色名</div>
                    <div class="panel-add-row">
                        <textarea id="panelOutName" placeholder="粘贴花色名称，每行一个&#10;如：&#10;蓝色圆舞曲半年抛&#10;笨蛋美女半年抛" rows="3" style="flex:1;font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:6px;resize:vertical;"></textarea>
                        <button class="btn btn-primary btn-small" onclick="addPanelItemSmart('out')">添加</button>
                    </div>
                </div>
                <div class="panel-body" id="outList"></div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="dot dot-orange"></span>
                        预计到货
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end;">
                        <input type="text" id="searchRestock" placeholder="🔍 搜索花色..." style="padding:4px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;width:120px;" oninput="filterPanel('restock')">
                        <span class="panel-badge" id="restockBadge">0</span>
                        <button class="btn btn-small" style="background:#e67e22;color:white;border:none;padding:4px 10px;font-size:12px;cursor:pointer;" onclick="togglePanelAdd('restock')" title="添加预计到货">➕</button>
                    </div>
                </div>
                <div class="panel-add-form" id="panelAdd-restock" style="display:none;padding:10px 16px;background:#f8f9fa;border-bottom:1px solid #f0f0f0;">
                    <div style="font-size:11px;color:#888;margin-bottom:6px;">💡 智能识别：粘贴「花色：预计日期」格式，自动解析</div>
                    <div class="panel-add-row">

    <script>
        // 默认数据
        const DEFAULT_DATA = {
            outOfStock: [
                { name: "超大酥酥绿", type: "半年抛", note: "缺货后续下架不补", status: "permanent", id: "1" },
                { name: "柏林热吻", type: "半年抛", note: "缺货后续下架不补", status: "permanent", id: "2" },
                { name: "微醺海浪6片装", type: "日抛", note: "缺货后续下架不补", status: "permanent", id: "3" },
                { name: "浮游记忆6片装", type: "日抛", note: "缺货后续下架不补", status: "permanent", id: "4" },
                { name: "快乐小狗半年抛", type: "半年抛", note: "缺货后续下架不补", status: "permanent", id: "5" },
                { name: "快乐小狗日抛6片装", type: "日抛", note: "缺货后续下架不补", status: "permanent", id: "6" },
                { name: "蜂蜜罐罐6片装", type: "日抛", note: "缺货后续下架不补", status: "permanent", id: "7" },
                { name: "月光骑士", type: "半年抛", note: "缺货后续下架不补", status: "permanent", id: "8" },
                { name: "初恋小事", type: "半年抛", note: "缺货后续下架不补", status: "permanent", id: "9" },
                { name: "超大荧光水母", type: "半年抛", note: "缺货后续下架不补", status: "permanent", id: "10" },
                { name: "心动降临半年抛", type: "半年抛", note: "缺货后续下架不补", status: "permanent", id: "11" }
            ],
            restocking: [
                { name: "小黑环pro6片装", type: "日抛", expectedDate: "6.30", note: "", status: "restocking", id: "12" },
                { name: "d在逃公主pro半年抛", type: "半年抛", expectedDate: "6.21", note: "", status: "restocking", id: "13" },
                { name: "超大宝宝棕", type: "半年抛", expectedDate: "6.30", note: "", status: "restocking", id: "14" },
                { name: "无人区玫瑰半年抛", type: "半年抛", expectedDate: "6.30", note: "", status: "restocking", id: "15" },
                { name: "d落日漫游", type: "半年抛", expectedDate: "7月初", note: "", status: "restocking", id: "16" },
                { name: "d虚拟泪光半年抛", type: "半年抛", expectedDate: "6.21", note: "", status: "restocking", id: "17" },
                { name: "妮妮千金半年抛", type: "半年抛", expectedDate: "6.22", note: "", status: "restocking", id: "18" }
            ]
        };

        let data = { outOfStock: [], restocking: [] };
        let checkedItems = JSON.parse(localStorage.getItem('checkedItems') || '[]');

        function init() {
            const saved = localStorage.getItem('stockData');
            if (saved) {
                try {
                    data = JSON.parse(saved);
                    // 如果保存的数据为空,回退到默认数据
                    if (data.outOfStock.length === 0 && data.restocking.length === 0) {
                        data = JSON.parse(JSON.stringify(DEFAULT_DATA));
                    }
                } catch(e) { data = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
            } else {
                data = JSON.parse(JSON.stringify(DEFAULT_DATA));
            }
            render();
        }

        function save() {
            localStorage.setItem('stockData', JSON.stringify(data));
            render();
        }

        // 根据花色名称自动推断类型
        function inferType(name) {
            if (!name) return '日抛';
            if (name.includes('6片装') || name.includes('2片装')) return '日抛';
            return '半年抛';
        }

        // 检查是否已存在同名+同类型的花色
        function isDuplicate(name, type) {
            const allItems = [...data.outOfStock, ...data.restocking];
            return allItems.some(i => i.name === name && i.type === type);
        }

        function parseDate(dateStr) {
            if (!dateStr) return null;
            const today = new Date();
            const year = today.getFullYear();

            // 匹配 "6.21" "6.30" 格式
            const m = dateStr.match(/(\d{1,2})\.(\d{1,2})/);
            if (m) {
                const month = parseInt(m[1]) - 1;
                const day = parseInt(m[2]);
                const d = new Date(year, month, day);
                return d;
            }
            // 匹配 "7月初" 等模糊日期
            if (dateStr.includes('初')) {
                const m2 = dateStr.match(/(\d{1,2})/);
                if (m2) return new Date(year, parseInt(m2[1]) - 1, 5);
            }
            return null;
        }

        function isToday(dateStr) {
            const d = parseDate(dateStr);
            if (!d) return false;
            const today = new Date();
            return d.getDate() === today.getDate() && d.getMonth() === today.getMonth();
        }

        function isPast(dateStr) {
            const d = parseDate(dateStr);
            if (!d) return false;
            const today = new Date();
            today.setHours(0,0,0,0);
            return d < today;
        }

        function isSoon(dateStr) {
            const d = parseDate(dateStr);
            if (!d) return false;
            const today = new Date();
            today.setHours(0,0,0,0);
            const diff = (d - today) / (1000 * 60 * 60 * 24);
            return diff >= 0 && diff <= 3;
        }

        function render() {
            // 统计
            const todayArriving = data.restocking.filter(i => isToday(i.expectedDate));
            document.getElementById('statOut').textContent = data.outOfStock.length;
            document.getElementById('statRestock').textContent = data.restocking.length;
            document.getElementById('statToday').textContent = todayArriving.length;
            document.getElementById('statTotal').textContent = data.outOfStock.length + data.restocking.length;
            document.getElementById('outBadge').textContent = data.outOfStock.length;
            document.getElementById('restockBadge').textContent = data.restocking.length;

            // 今日到货高亮
            const highlight = document.getElementById('todayHighlight');
            if (todayArriving.length > 0) {
                highlight.innerHTML = `
                    <div class="today-highlight">
                        <span class="icon">🎉</span>
                        <span class="text">今日到货:${todayArriving.map(i => i.name).join('、')} - 可以正常备注!</span>
                    </div>
                `;
            } else {
                highlight.innerHTML = '';
            }

            // 轮播:只显示即将到货和今日到货的,缺货下架的不显示
            const ticker = document.getElementById('tickerScroll');
            let items = [];
            // 优先显示今日到货和即将到货的
            const urgentItems = data.restocking.filter(i => isToday(i.expectedDate) || isSoon(i.expectedDate));
            const otherItems = data.restocking.filter(i => !isToday(i.expectedDate) && !isSoon(i.expectedDate));

            urgentItems.forEach(item => {
                const today = isToday(item.expectedDate);
                const label = today ? '✅今日到货' : `预计${item.expectedDate}左右到货`;
                items.push(`<span class="ticker-item"><span class="badge">${today ? '今日' : '快到'}</span>${item.name} - <span class="date">${label}</span></span>`);
            });
            otherItems.forEach(item => {
                items.push(`<span class="ticker-item"><span class="badge">待补</span>${item.name} - 预计${item.expectedDate}左右到货</span>`);
            });

                        ticker.innerHTML = items.join('') + items.join('');
            if (items.length === 0) {
                ticker.innerHTML = '<span class="ticker-item">✅ 当前所有花色库存正常</span>';
            }

            // 缺货列表
            const outList = document.getElementById('outList');
            if (data.outOfStock.length === 0) {
                outList.innerHTML = '<div class="empty"><div class="empty-icon">🎉</div>暂无缺货下架花色</div>';
            } else {
                const sortedOut = [...data.outOfStock].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
                outList.innerHTML = sortedOut.map(item => {
                    const isChecked = checkedItems.includes(item.id);
                    return `
                        <div class="stock-item permanent ${isChecked ? 'checked' : ''} ${item.pinned ? 'pinned' : ''}" data-id="${item.id}" data-name="${item.name}">
                            <div class="name-row">
                                <div style="display:flex;align-items:center;flex:1;">
                                    <span class="name">${item.name}</span>
                                    <span class="tag tag-type">${item.type}</span>
                                    ${item.pinned ? '<span class="tag" style="background:#f59e0b;color:white;">⭐ 置顶</span>' : ''}
                                </div>
                                <span class="tag tag-status-down" onclick="showQuickEdit('${item.id}')" style="cursor:pointer;user-select:none;">缺货下架 ▾</span>
                            </div>
                            <div class="meta-row">
                                <span class="meta">⚠️ 此花色后续不补货，但部分度数可能仍有库存，备注前请到旺店通查库存确认</span>
                            </div>
                            ${item.note ? `<div class="note">${item.note}</div>` : ''}
                            <div style="display:flex;gap:8px;margin-top:10px;">
                                <button class="check-btn" style="background:${item.pinned ? '#6b7280' : '#f59e0b'};color:white;" onclick="togglePin('${item.id}')">${item.pinned ? '☆ 取消置顶' : '⭐ 置顶'}</button>
                                <button class="check-btn" style="background:#8b5cf6;" onclick="showQuickEdit('${item.id}')">✏️ 编辑</button>
                            </div>
                            <div class="quick-edit" id="edit-${item.id}" style="display:none;">
                                <div class="quick-edit-row">
                                    <input type="text" id="edit-name-${item.id}" value="${item.name}" placeholder="花色名称" style="flex:1;min-width:120px;">
                                    <select id="edit-status-${item.id}" onchange="toggleEditDate('${item.id}')">
                                        <option value="permanent">缺货下架</option>
                                        <option value="restocking">预计到货</option>
                                        <option value="ok">已到货/移除</option>
                                    </select>
                                    <input type="text" id="edit-date-${item.id}" placeholder="预计日期" style="display:none;width:100px;">
                                    <button class="btn btn-primary btn-small" onclick="applyEdit('${item.id}')">保存</button>
                                    <button class="btn btn-secondary btn-small" onclick="hideQuickEdit('${item.id}')">取消</button>
                                    <button class="btn btn-danger btn-small" onclick="deleteItem('${item.id}')">🗑️</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // 到货列表
            const restockList = document.getElementById('restockList');
            if (data.restocking.length === 0) {
                restockList.innerHTML = '<div class="empty"><div class="empty-icon">📦</div>暂无待补货花色</div>';
            } else {
                // 按紧急程度排序:今日到货 > 即将到货 > 其他，同时置顶优先
                const sorted = [...data.restocking].sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    const aToday = isToday(a.expectedDate) ? 2 : isSoon(a.expectedDate) ? 1 : 0;
                    const bToday = isToday(b.expectedDate) ? 2 : isSoon(b.expectedDate) ? 1 : 0;
                    return bToday - aToday;
                });

                restockList.innerHTML = sorted.map(item => {
                    const isChecked = checkedItems.includes(item.id);
                    const today = isToday(item.expectedDate);
                    const soon = isSoon(item.expectedDate) && !today;
                    const past = isPast(item.expectedDate) && !today;
                    const cls = today ? 'arriving-today' : soon ? 'arriving-soon' : 'restocking';
                    const statusLabel = today ? '✅ 今日到货' : past ? '⚠️ 已逾期' : '预计到货';
                    const statusCls = today ? 'tag-status-today' : 'tag-status-coming';
                    const dateCls = today ? 'today' : past ? 'past' : '';
                    const notifyText = `${item.name} 预计${item.expectedDate}左右到货`;

                    return `
                        <div class="stock-item ${cls} ${isChecked ? 'checked' : ''} ${item.pinned ? 'pinned' : ''}" data-id="${item.id}" data-name="${item.name}">
                            <div class="name-row">
                                <div style="display:flex;align-items:center;flex:1;">
                                    <span class="name">${item.name}</span>
                                    <span class="tag tag-type">${item.type}</span>
                                    ${item.pinned ? '<span class="tag" style="background:#f59e0b;color:white;">⭐ 置顶</span>' : ''}
                                </div>
                                <span class="tag ${statusCls}" onclick="showQuickEdit('${item.id}')" style="cursor:pointer;user-select:none;">${statusLabel} ▾</span>
                            </div>
                            <div class="meta-row">
                                <span class="meta">${today ? '可以正常备注!' : '告知客户预计到货时间'}</span>
                                <span class="date ${dateCls}">${today ? '今日' : '预计 ' + item.expectedDate}</span>
                            </div>
                            ${item.note ? `<div class="note">${item.note}</div>` : ''}
                            <div style="display:flex;gap:8px;margin-top:10px;">
                                <button class="check-btn" style="background:${item.pinned ? '#6b7280' : '#f59e0b'};color:white;" onclick="togglePin('${item.id}')">${item.pinned ? '☆ 取消置顶' : '⭐ 置顶'}</button>
                                <button class="check-btn" style="background:#3498db;" onclick="copyNotify('${item.name}', '${item.expectedDate}')">📋 复制</button>
                                <button class="check-btn" style="background:#8b5cf6;" onclick="showQuickEdit('${item.id}')">✏️ 编辑</button>
                            </div>
                            <div class="quick-edit" id="edit-${item.id}" style="display:none;">
                                <div class="quick-edit-row">
                                    <input type="text" id="edit-name-${item.id}" value="${item.name}" placeholder="花色名称" style="flex:1;min-width:120px;">
                                    <select id="edit-status-${item.id}" onchange="toggleEditDate('${item.id}')">
                                        <option value="restocking" ${item.status === 'restocking' ? 'selected' : ''}>预计到货</option>
                                        <option value="permanent">缺货下架</option>
                                        <option value="ok">已到货/移除</option>
                                    </select>
                                    <input type="text" id="edit-date-${item.id}" placeholder="预计日期" value="${item.expectedDate || ''}" style="${item.status === 'restocking' ? '' : 'display:none;'}width:100px;">
                                    <button class="btn btn-primary btn-small" onclick="applyEdit('${item.id}')">保存</button>
                                    <button class="btn btn-secondary btn-small" onclick="hideQuickEdit('${item.id}')">取消</button>
                                    <button class="btn btn-danger btn-small" onclick="deleteItem('${item.id}')">🗑️</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            updateManageList();
            document.getElementById('dataJson').value = JSON.stringify(data, null, 2);
            // 保持当前搜索过滤状态
            filterPanel('out');
            filterPanel('restock');
        }

        function togglePin(id) {
            let item = data.outOfStock.find(i => i.id === id);
            if (!item) item = data.restocking.find(i => i.id === id);
            if (!item) return;
            item.pinned = !item.pinned;
            save();
            render();
            showToast(item.pinned ? '「' + item.name + '」已置顶' : '「' + item.name + '」已取消置顶');
        }

        function toggleCheck(id) {
            if (checkedItems.includes(id)) {
                checkedItems = checkedItems.filter(i => i !== id);
            } else {
                checkedItems.push(id);
            }
            localStorage.setItem('checkedItems', JSON.stringify(checkedItems));
            render();
        }

        function toggleExpand() {
            // 点击轮播条可以展开/收起详情(可扩展)
        }

        function filterPanel(panel) {
            const query = document.getElementById('search' + (panel === 'out' ? 'Out' : 'Restock')).value.trim().toLowerCase();
            const list = document.getElementById(panel === 'out' ? 'outList' : 'restockList');
            const items = list.querySelectorAll('.stock-item');
            let visibleCount = 0;
            items.forEach(item => {
                const name = (item.getAttribute('data-name') || '').toLowerCase();
                if (!query || name.includes(query)) {
                    item.style.display = '';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });
            // 如果搜索但没有结果，显示提示
            const noResult = list.querySelector('.no-search-result');
            if (noResult) noResult.remove();
            if (query && visibleCount === 0 && items.length > 0) {
                const div = document.createElement('div');
                div.className = 'no-search-result';
                div.style.cssText = 'text-align:center;padding:20px;color:#999;font-size:13px;';
                div.textContent = '🔍 未找到匹配「' + query + '」的花色';
                list.appendChild(div);
            }
        }

        function toggleTickerOnly() {
            document.body.classList.toggle('ticker-only');
            showToast(document.body.classList.contains('ticker-only') ? '已切换为仅轮播模式' : '已恢复完整看板');
        }

        function updateManageList() {
            const allItems = [
                ...data.outOfStock.map(i => ({...i, category: '缺货下架'})),
                ...data.restocking.map(i => ({...i, category: '预计到货'}))
            ];
            const list = document.getElementById('manageList');
            if (allItems.length === 0) {
                list.innerHTML = '<div class="empty">暂无数据</div>';
            } else {
                list.innerHTML = allItems.map(item => `
                    <div class="manage-item">
                        <div class="manage-item-info">
                            <div class="manage-item-name">${item.name}</div>
                            <div class="manage-item-meta">${item.type} | ${item.category}${item.expectedDate ? ' | 预计' + item.expectedDate : ''}</div>
                        </div>
                        <div class="manage-item-actions">
                            <button class="btn btn-secondary btn-small" onclick="editItem('${item.id}')">编辑</button>
                            <button class="btn btn-danger btn-small" onclick="deleteItem('${item.id}')">删除</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function openManage() {
            document.getElementById('manageModal').classList.add('active');
        }
        function closeManage() {
            document.getElementById('manageModal').classList.remove('active');
            resetForm();
        }
        function toggleDateField() {
            const status = document.getElementById('newStatus').value;
            document.getElementById('dateGroup').style.display = status === 'restocking' ? 'block' : 'none';
        }
        function toggleBatchMode() {
            const batchMode = document.getElementById('batchMode').checked;
            document.getElementById('singleForm').style.display = batchMode ? 'none' : 'block';
            document.getElementById('batchForm').style.display = batchMode ? 'block' : 'none';
            if (batchMode) toggleBatchDateField();
        }
        function toggleBatchDateField() {
            const status = document.getElementById('batchStatus').value;
            document.getElementById('batchDateGroup').style.display = status === 'restocking' ? 'block' : 'none';
        }
        function resetBatchForm() {
            document.getElementById('batchNames').value = '';
            document.getElementById('batchType').value = '日抛';
            document.getElementById('batchStatus').value = 'permanent';
            document.getElementById('batchDate').value = '';
            document.getElementById('batchNote').value = '';
            toggleBatchDateField();
        }
        function addBatchItems() {
            const namesRaw = document.getElementById('batchNames').value.trim();
            let type = document.getElementById('batchType').value;
            const status = document.getElementById('batchStatus').value;
            const date = document.getElementById('batchDate').value.trim();
            const note = document.getElementById('batchNote').value.trim();
            if (!namesRaw) { showToast('请输入花色列表'); return; }

            const names = namesRaw.split('\n').map(n => n.trim()).filter(n => n);
            if (names.length === 0) { showToast('请输入有效的花色名称'); return; }

            let added = 0;
            let skipped = 0;
            const baseTime = Date.now();
            names.forEach((name, idx) => {
                // 自动推断类型
                let finalType = type;
                if (type === 'auto') {
                    finalType = inferType(name);
                }

                // 去重检查
                if (isDuplicate(name, finalType)) {
                    skipped++;
                    return;
                }

                const id = (baseTime + idx).toString();
                const item = { name, type: finalType, status, note, id };
                if (status === 'restocking') {
                    item.expectedDate = date || '待定';
                    data.restocking.push(item);
                } else if (status === 'permanent') {
                    item.note = note || '缺货后续下架不补';
                    data.outOfStock.push(item);
                } else {
                    return;
                }
                added++;
            });

            if (status === 'ok') {
                showToast('已到货的花色从监控中移除,未添加');
                return;
            }
            save();
            resetBatchForm();
            let msg = '成功添加 ' + added + ' 款花色';
            if (skipped > 0) msg += ',' + skipped + ' 款已存在自动跳过';
            showToast(msg);
        }

        // === 快速添加 ===
        function openQuickAdd() {
            document.getElementById('quickAddModal').classList.add('active');
            document.getElementById('quickStatus').addEventListener('change', toggleQuickDateField);
            toggleQuickDateField();
        }
        function closeQuickAdd() {
            document.getElementById('quickAddModal').classList.remove('active');
            document.getElementById('quickName').value = '';
            document.getElementById('quickType').value = 'auto';
            document.getElementById('quickStatus').value = 'permanent';
            document.getElementById('quickDate').value = '';
            document.getElementById('quickNote').value = '';
            toggleQuickDateField();
        }
        function toggleQuickDateField() {
            const status = document.getElementById('quickStatus').value;
            document.getElementById('quickDateGroup').style.display = status === 'restocking' ? 'block' : 'none';
        }
        function quickAddItem() {
            const name = document.getElementById('quickName').value.trim();
            let type = document.getElementById('quickType').value;
            const status = document.getElementById('quickStatus').value;
            const date = document.getElementById('quickDate').value.trim();
            const note = document.getElementById('quickNote').value.trim();
            if (!name) { showToast('请输入花色名称'); return; }

            // 自动推断类型
            if (type === 'auto') {
                type = inferType(name);
            }

            // 去重检查
            if (isDuplicate(name, type)) {
                showToast('「' + name + '」已存在');
                return;
            }

            const id = Date.now().toString();
            const item = { name, type, status, note, id };

            if (status === 'restocking') {
                item.expectedDate = date || '待定';
                data.restocking.push(item);
            } else if (status === 'permanent') {
                item.note = note || '缺货后续下架不补';
                data.outOfStock.push(item);
            }
            save();
            closeQuickAdd();
            showToast('已添加「' + name + '」,同事会收到提醒');
        }

        // 复制通知文案到剪贴板
        function copyNotify(name, date) {
            const text = '【' + name + '】 预计' + date + '左右到货';
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('已复制:' + text);
        }

        // === 面板内快速添加 ===
        function togglePanelAdd(panel) {
            const el = document.getElementById('panelAdd-' + panel);
            const isHidden = el.style.display === 'none' || el.style.display === '';
            // 先隐藏所有面板添加表单
            document.querySelectorAll('.panel-add-form').forEach(f => f.style.display = 'none');
            if (isHidden) {
                el.style.display = 'block';
                if (panel === 'out') {
                    document.getElementById('panelOutName').focus();
                } else {
                    document.getElementById('panelRestockSmart').focus();
                }
            }
        }

        // === 智能解析粘贴的文本 ===
        function smartParseItems(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const items = [];
            lines.forEach(line => {
                // 尝试匹配 "花色名称：预计日期" 或 "花色名称:预计日期"
                const m = line.match(/^(.+?)[\uff1a:]\s*预计\s*(.+)$/);
                if (m) {
                    let name = m[1].trim();
                    let date = m[2].trim()
                        .replace(/\u5de6\u53f3?$/, '')   // 去掉"左右"
                        .replace(/\u53f7$/, '')          // 去掉"号"
                        .replace(/^26\./, '')            // 去掉 "26." 前缀
                        .trim();
                    items.push({ name, date });
                } else if (line) {
                    // 没有日期格式，只提取名称
                    items.push({ name: line, date: '\u5f85\u5b9a' });
                }
            });
            return items;
        }

        function addPanelItemSmart(panel) {
            let items, added = 0, skipped = 0, dupes = [];
            if (panel === 'out') {
                const text = document.getElementById('panelOutName').value.trim();
                if (!text) { showToast('\u8bf7\u8f93\u5165\u82b1\u8272\u540d\u79f0'); return; }
                items = text.split('\n').map(l => l.trim()).filter(l => l).map(name => ({ name, date: null }));
                items.forEach((item, idx) => {
                    const type = inferType(item.name);
                    if (isDuplicate(item.name, type)) { skipped++; dupes.push(item.name); return; }
                    const id = (Date.now() + idx).toString();
                    data.outOfStock.push({ name: item.name, type, status: 'permanent', note: '\u7f3a\u8d27\u540e\u7eed\u4e0b\u67b6\u4e0d\u8865', id });
                    added++;
                });
                document.getElementById('panelOutName').value = '';
            } else {
                const text = document.getElementById('panelRestockSmart').value.trim();
                if (!text) { showToast('\u8bf7\u8d34\u4e0a\u82b1\u8272\u4fe1\u606f'); return; }
                items = smartParseItems(text);
                if (items.length === 0) { showToast('\u672a\u80fd\u8bc6\u522b\u5230\u6709\u6548\u683c\u5f0f'); return; }
                items.forEach((item, idx) => {
                    const type = inferType(item.name);
                    if (isDuplicate(item.name, type)) { skipped++; dupes.push(item.name); return; }
                    const id = (Date.now() + idx).toString();
                    data.restocking.push({ name: item.name, type, status: 'restocking', expectedDate: item.date, id });
                    added++;
                });
                document.getElementById('panelRestockSmart').value = '';
            }
            save();
            let msg = '\u5df2\u6dfb\u52a0 ' + added + ' \u6761';
            if (skipped > 0) msg += '\uff0c\u8df3\u8fc7 ' + skipped + ' \u6761\u91cd\u590d';
            showToast(msg);
            togglePanelAdd(panel);
        }

        // === 列表内联编辑 ===
        function showQuickEdit(id) {
            // 先隐藏其他编辑区
            document.querySelectorAll('.quick-edit').forEach(el => el.style.display = 'none');
            const editDiv = document.getElementById('edit-' + id);
            if (editDiv) {
                editDiv.style.display = 'block';
            }
        }
        function hideQuickEdit(id) {
            const editDiv = document.getElementById('edit-' + id);
            if (editDiv) {
                editDiv.style.display = 'none';
            }
        }
        function toggleEditDate(id) {
            const status = document.getElementById('edit-status-' + id).value;
            const dateInput = document.getElementById('edit-date-' + id);
            if (dateInput) {
                dateInput.style.display = status === 'restocking' ? 'inline-block' : 'none';
            }
        }
        function applyEdit(id) {
            const status = document.getElementById('edit-status-' + id).value;
            const dateInput = document.getElementById('edit-date-' + id);
            const newDate = dateInput ? dateInput.value.trim() : '';
            const nameInput = document.getElementById('edit-name-' + id);
            const newName = nameInput ? nameInput.value.trim() : '';

            // 找到当前条目
            let item = data.outOfStock.find(i => i.id === id);
            let fromList = 'outOfStock';
            if (!item) {
                item = data.restocking.find(i => i.id === id);
                fromList = 'restocking';
            }
            if (!item) { showToast('未找到该条目'); return; }

            // 更新名称
            if (newName && newName !== item.name) {
                item.name = newName;
            }

            // 删除旧条目
            data.outOfStock = data.outOfStock.filter(i => i.id !== id);
            data.restocking = data.restocking.filter(i => i.id !== id);

            if (status === 'ok') {
                showToast('「' + item.name + '」已移除');
            } else if (status === 'restocking') {
                item.status = 'restocking';
                item.expectedDate = newDate || '待定';
                delete item.note;
                data.restocking.push(item);
                showToast('「' + item.name + '」已设为预计到货' + (newDate ? '(' + newDate + ')' : ''));
            } else if (status === 'permanent') {
                item.status = 'permanent';
                item.note = '缺货后续下架不补';
                delete item.expectedDate;
                data.outOfStock.push(item);
                showToast('「' + item.name + '」已设为缺货下架');
            }
            save();
            hideQuickEdit(id);
        }

        function resetForm() {
            document.getElementById('newName').value = '';
            document.getElementById('newType').value = 'auto';
            document.getElementById('newStatus').value = 'permanent';
            document.getElementById('newDate').value = '';
            document.getElementById('newNote').value = '';
            toggleDateField();
        }
        function addItem() {
            let name = document.getElementById('newName').value.trim();
            let type = document.getElementById('newType').value;
            const status = document.getElementById('newStatus').value;
            const date = document.getElementById('newDate').value.trim();
            const note = document.getElementById('newNote').value.trim();
            if (!name) { showToast('请输入花色名称'); return; }

            // 自动推断类型
            if (type === 'auto') {
                type = inferType(name);
            }

            // 去重检查
            if (isDuplicate(name, type)) {
                showToast('「' + name + '」已存在,已自动跳过');
                return;
            }

            const id = Date.now().toString();
            const item = { name, type, status, note, id };

            if (status === 'restocking') {
                item.expectedDate = date || '待定';
                data.restocking.push(item);
            } else if (status === 'permanent') {
                item.note = note || '缺货后续下架不补';
                data.outOfStock.push(item);
            } else {
                showToast('已到货的花色从监控中移除');
                return;
            }
            save();
            resetForm();
            showToast('添加成功');
        }
        function deleteItem(id) {
            if (!confirm('确定删除?')) return;
            data.outOfStock = data.outOfStock.filter(i => i.id !== id);
            data.restocking = data.restocking.filter(i => i.id !== id);
            checkedItems = checkedItems.filter(i => i !== id);
            localStorage.setItem('checkedItems', JSON.stringify(checkedItems));
            save();
            showToast('已删除');
        }
        function editItem(id) {
            let item = data.outOfStock.find(i => i.id === id) || data.restocking.find(i => i.id === id);
            if (!item) return;
            document.getElementById('newName').value = item.name;
            document.getElementById('newType').value = item.type;
            document.getElementById('newStatus').value = item.status;
            document.getElementById('newDate').value = item.expectedDate || '';
            document.getElementById('newNote').value = item.note || '';
            toggleDateField();
            data.outOfStock = data.outOfStock.filter(i => i.id !== id);
            data.restocking = data.restocking.filter(i => i.id !== id);
            save();
            showToast('已载入编辑,修改后点击添加');
        }
        function copyData() {
            const textarea = document.getElementById('dataJson');
            textarea.select();
            document.execCommand('copy');
            showToast('数据已复制,发给同事即可同步');
        }
        function importData() {
            const text = document.getElementById('dataJson').value.trim();
            if (!text) { showToast('请粘贴数据'); return; }
            try {
                const parsed = JSON.parse(text);
                if (parsed.outOfStock && parsed.restocking) {
                    data = parsed;
                    save();
                    showToast('导入成功!数据已同步');
                } else {
                    showToast('数据格式错误');
                }
            } catch(e) {
                showToast('JSON格式错误');
            }
        }
        function loadDefault() {
            if (!confirm('确定重置?当前修改会丢失')) return;
            data = JSON.parse(JSON.stringify(DEFAULT_DATA));
            checkedItems = [];
            localStorage.setItem('checkedItems', '[]');
            save();
            showToast('已重置为默认数据');
        }
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.getElementById('manageModal').addEventListener('click', function(e) {
            if (e.target === this) closeManage();
        });
        document.getElementById('quickAddModal').addEventListener('click', function(e) {
            if (e.target === this) closeQuickAdd();
        });

        init();
        toggleDateField();
    </script>
</body>
</html>
